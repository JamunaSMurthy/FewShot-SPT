# FewShot-SPT Dataset Configuration
# Copy and modify this file for your setup

[paths]
# Raw dataset directories (after download)
ucf_crime_raw = ~/datasets/UCF_Crime
xd_violence_raw = ~/datasets/XD_Violence
shanghaitech_raw = ~/datasets/ShanghaiTech

# Output directories
output_dir = ./data
features_dir = ./data/features
processed_dir = ./data/processed

# Temporary directory (for intermediate files)
temp_dir = /tmp/fewshot_spt

[video_processing]
# Video extraction parameters
frame_size_h = 224
frame_size_w = 224
num_frames = 16
target_fps = 25

# Video codec
video_codec = mp4v
video_quality = 95

[audio_processing]
# Audio feature parameters
sample_rate = 16000
n_mels = 128
n_fft = 1024
hop_length = 512

[dataset_splits]
# Train/test/few-shot split ratios
train_ratio = 0.8
test_ratio = 0.2

# Few-shot parameters
few_shot_n_way = 5
few_shot_n_shot = 5
few_shot_n_query = 10

[processing]
# Batch and parallelization
batch_size = 32
num_workers = 4
max_retries = 3

# Verbosity
verbose = true
show_progress = true

# Resource limits
max_memory_gb = 16
timeout_seconds = 300

[validation]
# Validation settings
check_corrupted = true
auto_remove_corrupted = false
min_valid_ratio = 0.95
min_video_frames = 10

# Report settings
generate_report = true
report_format = json
